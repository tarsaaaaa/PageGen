<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: bisque;
        }

        .page {
            width: 210mm;
            height: 297mm;
            background-color: white;
            margin: 20mm auto;
            padding: 20mm;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .logo {
            width: 100%;
            height: 233px;
            margin-bottom: 20px;
            background-image: url("assets/logo.png");
            display: flex;
            justify-content: center;
            align-items: center;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .middle-lines {
            width: 100%;
            height: 381px;
            background-image: url("assets/middle-lines.png");
            margin: 20px 0;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        table {
            width: 100%;
            margin-top: 20px;
            margin-left: 50px;
            margin-bottom: 50px;
            border-collapse: collapse;
        }

        td {
            font-size: 18px;
            padding: 5px;
            text-align: left;
        }

        .bold {
            font-weight: bold;
        }

        .unbold {
            font-weight: normal;
        }

        .underlined {
            text-decoration: underline;
        }

        .centerd {
            text-align: center;
        }

        .def-margin {
            margin: 3mm;
        }
    </style>
</head>
<body>
    <div class="page centerd">
        <div class="logo centerd"></div>

        <h1 class="def-margin">Tribhuwan University</h1>

        <h2 class="def-margin unbold">Institute of Science and Technology</h2>
        
        <div class="middle-lines"></div>

        <h3 class="def-margin unbold">Department of <span class="faculty">BIT</span></h3>

        <h3 class="def-margin unbold">Bhaktapur Multple Campus, Bhaktapur</h3>
        
        <h3 class="def-margin"><span class="lab-title">Lab Report</span> on</h3>

        <h3 class="def-margin"><span class="subject">Mathematics</span></h3>

        <table class="">
            <tr>
                <td class="bold underlined">Submitted by:</td>
                <td class="bold underlined">Submitted to:</td>
            </tr>
            <tr>
                <td>Name: <span class="name">Sakchyam Shrestha</span></td>
                <td class="teacher">Sushil Shrestha</td>
            </tr>
            <tr>
                <td>Roll No.: <span class="roll">56</span></td>
            </tr>
            <tr>
                <td><span class="faculty">BIT</span> (Semester <span class="sem"></span>)</td>
                <td>Signature: ________________</td>
            </tr>
            <tr>
                <td>Section: "<span class="section">B</span>"</td>
            </tr>
        </table>

        <h3 class="unbold">Submission Date: <span class="date"></span></h3>
    </div>
</body>
</html>
